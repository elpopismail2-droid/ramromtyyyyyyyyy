<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>рҹ”Ҙ</title>
<style>
body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
min-height:100vh;
overflow-y:auto;
background:linear-gradient(180deg,#000000,#1a1a1a,#2c2c2c);
}

/* ЩӮЩ„ЩҲШЁ */
.hearts{position:absolute;width:100%;height:100%;z-index:-1;}
.heart{
position:absolute;
font-size:25px;
animation:float 5s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100px);}
}

/* ШөЩҶШҜЩҲЩӮ */
.box{
background:rgba(0,0,0,0.7);
padding:20px;
margin:50px auto;
border-radius:15px;
width:90%;
max-width:400px;
}

/* ЩӮЩ„ШЁ */
#heart{
font-size:120px;
cursor:pointer;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
50%{transform:scale(1.3);}
}

/* ШұШіШ§Щ„Ш© */
#msg{
display:none;
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:20px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="box" id="welcome">
<h2>ЩғЩ„ ШіЩҶЩҮ ЩҲШ§ЩҶШӘШ§ Ш·ЩҠШЁ ЩҠШ§ ШұЩҲЩ…Ш§Ш§Ш§Ш§рҹ«ЎвқӨрҹҳ—рҹҷ„</h2>
<button onclick="goLogin()">ШҜШ®ЩҲЩ„</button>
</div>

<div class="box" id="login" style="display:none;">
<h3>ЩғЩ„Щ…Ш© Ш§Щ„ШіШұ</h3>
<input id="pass">
<button onclick="check()">ШҜШ®ЩҲЩ„</button>
</div>

<div class="box" id="main" style="display:none;">
<div id="heart">рҹ”ҘвқӨпёҸ</div>
<div id="msg"></div>
<audio id="audio" loop>
<source src="ssstik.io_1773931929844.mp3">
</audio>
</div>

<script>
const hearts=document.getElementById("hearts");
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="рҹ”Ҙ";
h.style.left=Math.random()*100+"%";
hearts.appendChild(h);
}

function goLogin(){
document.getElementById("welcome").style.display="none";
document.getElementById("login").style.display="block";
}

function check(){
if(document.getElementById("pass").value==="ШұЩ…ШұЩҲЩ…ШӘЩҠ"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else alert("ШәЩ„Ш· ЩҠШ§ ШөШ§ШӯШЁЩҠ рҹҳҸ");
}

const text=`ЩғЩ„ ШіЩҶЩҮ ЩҲШ§ЩҶШӘШ§ Ш·ЩҠШЁ ЩҠШ§ Ш¬Щ…ЩҠЩ„ 
ЩғЩ„ ШіЩҶЩҮ ЩҲШ§ЩҶШӘШ§ Ш·ЩҠШЁ ЩҠШ§ Ш§Ш®ЩҲЩҠШ§ 
ЩғЩ„ ШіЩҶЩҮ ЩҲЩҶШӘЩҠ Ш§Ш¬Щ…Щ„ Ш§Ш®ШӘрҹ«Ў


Ш№Ш§ЩҠШІЩҮ Ш§ЩҠЩҠЩҠЩҠрҹӨЁрҹӨЁрҹӨЁ
Ш§ЩғШӘШЁ Ш§Щ„Щ„ЩҠ Ш№Ш§ЩҠШІЩҮ ШЁШұШ§ШӯШӘЩҠЩҠЩҠЩҠЩҠрҹҷ„рҹҷ„рҹҷ„рҹӨЁрҹ”«рҹ”«рҹ”«
Ш№Ш§ЩҠШІЩҮ ШӘЩҶШ¶ШұШЁЩҠрҹӨЁрҹӨЁрҹӨЁрҹӨЁ
Ш§ЩҲШ№Ш§ ЩҠШ§Ш№Щ… Ш§Щ„ЩҶШ§Ші Ш§Щ„Щ„ЩҠ ЩҮШӘШ§Ш®ШҜ Ш№ЩҠШҜЩҠЩҮ ЩҲЩҮШӘШ№ЩҠШҜ ШЁЩӮШ§Ш§Ш§Ш§Ш§рҹҷӮрҹҳӮ
Ш§ЩҠ ЩҠШөШӯШЁЩҠ Щ… ЩҮШӘШ№ЩҠШҜЩҶШ§ ШЁЩӮШ§Ш§Ш§Ш§рҹӨЁрҹҷ„

ЩғЩ„ ШіЩҶЩҮ ЩҲЩҶШӘШ§ Ш·ЩҠШЁ ЩҠШ§ Ш«ШӯШЁЩҠЩҠЩҠЩҠЩҠЩҠ ЩҲШіЩҶЩҮ ШіШ№ЩҠШҜЩҮ Ш№Щ„ЩҠЩғрҹҷ„
Ш§ШЁЩӮШ§ Ш§Щ„ШЁШі ШЁЩӮШ§ Ш§Щ„ШӯШёШ§ШёЩҮ ШЁЩғШұШ§ Ш§ЩҲШ№Ш§ ШӘЩҶШіЩҠрҹӨЁрҹӨЁрҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„ Ш§Щ„Ш§ Ш§Щ…ЩҲШӘЩғрҹҷ„рҹҷ„рҹҷ„рҹҷ„
ШЁШі ЩғШҜШ§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш§Ш№Ш№Ш№Ш№
ШЁШ§ЩҠрҹҷ„рҹ”«рҹҷӮ



Ш®ШҜЩҠ Ш®ШҜЩҠ ЩҒЩғШұШӘЩҠЩҶЩҠ ЩҮЩӮЩҒЩ„ ЩҲЩ„ Ш§ЩҠЩҠЩҠрҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„
Щ… ЩӮЩҲЩ„ШӘЩ„Щғ Ш№Ш§ЩҠШІЩҮ ШӘШӘШ¶ШұШЁЩҠрҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„
ЩҠЩ„Ш§ ШұЩҲШӯ ШЁЩӮШ§рҹҷ„рҹҷ„рҹҷ„
ШЁШ§ЩҠрҹҷ„рҹҷ„рҹҷ„рҹҷ„
Щ…ШӘЩӮЩҲЩ„Шҙ ШЁШ§ЩҠ рҹҷ„рҹҷ„рҹҷ„рҹҷ„
Ш№Ш§ЩҠШІ ШӘЩӮЩҒЩ„ ЩҲЩ„ Ш§ЩҠЩҠЩҠЩҠрҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„ 
ЩҮЩӮШӘЩ„Щғ рҹҷ„рҹҷ„
ШӯШ§ШіШЁЩҠ Ш№ ЩҲШҙЩғ ШЁЩғШұШ§ Ш№ШҙШ§ЩҶ ЩҮШ№ЩҲШұЩғрҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹ”«рҹ”«
ЩҠЩ„Ш§ ШЁШ§ЩҠрҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷ„рҹҷӮрҹ‘Ҹ`;

let i=0;
document.getElementById("heart").onclick=()=>{
document.getElementById("msg").style.display="block";
document.getElementById("audio").play();
function write(){
if(i<text.length){
document.getElementById("msg").innerHTML+=text[i];
i++;
setTimeout(write,35);
}}
write();
};
</script>

</body>
